upstream strapi_cms {
  server cms:1337;
  keepalive 32;
}

server {
  listen 80;
  server_name essencesourceusa.com www.essencesourceusa.com _;
  root /usr/share/nginx/html;
  index index.html;

  if ($host = www.essencesourceusa.com) {
    return 301 https://essencesourceusa.com$request_uri;
  }

  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
  add_header Content-Security-Policy "default-src 'self'; img-src 'self' data: https:; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; connect-src 'self' https://essencesourceusa.com; frame-ancestors 'self'; base-uri 'self'; form-action 'self'" always;

  gzip on;
  gzip_comp_level 6;
  gzip_min_length 1024;
  gzip_vary on;
  gzip_types text/plain text/css application/javascript application/json application/xml image/svg+xml;

  error_page 404 /404.html;

  location = /healthz {
    access_log off;
    add_header Content-Type text/plain;
    return 200 "ok\n";
  }

  location = /robots.txt {
    try_files /robots.txt =404;
    add_header Cache-Control "public, max-age=3600";
  }

  location = /sitemap.xml {
    try_files /sitemap.xml =404;
    add_header Cache-Control "public, max-age=3600";
  }

  location ~* \.(?:css|js|mjs|json|svg|png|jpg|jpeg|webp|avif|ico|woff2?)$ {
    try_files $uri =404;
    access_log off;
    add_header Cache-Control "public, max-age=31536000, immutable";
  }

  location ~* ^/(backend|infra|src|tests|node_modules|test-results|\.github)/ {
    return 404;
  }

  location ~ /\.(?!well-known) {
    return 404;
  }

  location /admin {
    proxy_pass http://strapi_cms;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location /api {
    proxy_pass http://strapi_cms;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location /uploads {
    proxy_pass http://strapi_cms;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location / {
    try_files $uri $uri.html $uri/ /404.html;
  }
}
